<html>
<head>
  <title>Test App Load</title>
</head>
<body>
  <div id="test-result">Loading...</div>
  <script>
    fetch('http://localhost:8000/src/tutorials.jsx')
      .then(r => r.text())
      .then(text => {
        const hasBlueStyle = text.includes('bg-blue-600');
        const result = hasBlueStyle ? 'PASS: Blue toast styling found' : 'FAIL: Blue style not found';
        document.getElementById('test-result').textContent = result;
      })
      .catch(e => {
        document.getElementById('test-result').textContent = 'ERROR: ' + e.message;
      });
  </script>
</body>
</html>
